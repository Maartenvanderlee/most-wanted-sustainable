name: Weekly data archive

# Borgt de append-only historie (het waardevolste bezit) buiten Supabase.
# Draait wekelijks (én handmatig via "Run workflow"), exporteert de kerntabellen
# en commit ze naar data/backup/. Git-historie wordt zo de versiebeheerde,
# duurzame kopie, ook als de gratis Supabase-tier ooit pauzeert of data verliest.
#
# Bevat GEEN newsletter_subscribers: dat zijn persoonsgegevens en horen niet in
# de git-historie (zie scripts/export-archive.mjs, ARCHIVE_TARGET=committed).
#
# Vereist twee repository-secrets: NEXT_PUBLIC_SUPABASE_URL en
# SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets and variables → Actions).

on:
  schedule:
    - cron: "30 5 * * 1" # elke maandag 05:30 UTC
  workflow_dispatch: {} # knop "Run workflow" voor een handmatige backup

# Nodig om de commit terug te kunnen pushen naar de repo.
permissions:
  contents: write

# Voorkomt dat twee archief-runs tegelijk pushen.
concurrency:
  group: data-archive
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Export the append-only history
        env:
          ARCHIVE_TARGET: committed
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/export-archive.mjs

      - name: Commit the backup if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backup
          if git diff --staged --quiet; then
            echo "Geen wijzigingen in de export — niets te committen."
          else
            git commit -m "chore(backup): wekelijkse data-archief-export [skip ci]"
            git push
          fi
